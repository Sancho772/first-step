<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>...</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1a0026, #3b0a4f, #14001f);
    background-size: 200% 200%;
    animation: gradientMove 15s ease infinite;
    color: #f8e9ff;
    text-align: center;
}

.container {
    max-width: 900px;
    padding: 40px;
    animation: fadeIn 2.5s ease forwards;
    opacity: 0;
}

h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 56px;
    font-weight: 400;
    line-height: 1.6;
    letter-spacing: 1px;
    text-shadow: 0 0 18px rgba(255, 200, 255, 0.35);
}

.button {
    margin-top: 70px;
    display: inline-block;
    padding: 14px 48px;
    border-radius: 50px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.35);
    color: #f8e9ff;
    text-decoration: none;
    font-size: 18px;
    font-family: serif;
    transition: all 0.4s ease;
    backdrop-filter: blur(6px);
}

.button:hover {
    background: rgba(255,255,255,0.25);
    transform: translateY(-4px);
}

/* 📱 Адаптация под телефон */
@media (max-width: 768px) {
    h1 {
        font-size: 38px;
        line-height: 1.4;
    }

    .button {
        font-size: 16px;
        padding: 12px 36px;
    }
}

@media (max-width: 480px) {
    h1 {
        font-size: 28px;
    }
}

@keyframes fadeIn {
    to { opacity: 1; }
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

textarea {
width: 100%;
max-width: 420px;
height: 110px;
padding: 12px;
border-radius: 12px;
border: none;
margin-top: 40px;
font-size: 16px;
resize: none;
background: rgba(255,255,255,0.2);
color: whithe;
}

button {
margin-top: 5   px;
padding: 12px 30px;
border-radius: 30px;
border: none;
background: rgba(255,255,255,0.2);
color: white;
font-size: 16px;
cursor: pointer;
}

button:hover {
background: rgba(255,255,255,0.35);
}

</style>

</head>

<body>

<div class="container">
    <h1>
        Иногда первый шаг остаётся без ответа.<br>
        Но это не повод не сделать второй...
    </h1>

    <a class="button" href="https://www.instagram.com/sancho_farkhadov1ch?igsh=MTg4ODdndHk3cWxzMQ==" target="_blank">
        Продолжить историю
    </a>

<form name="comment" method="POST" data-netlify="true">

<input type="hidden" name="form-name" value="comment" />

<textarea name="message" placeholder="Оставить комментарий..." required></textarea>

<button type="submit">Сохранить</button>

</form>

</div>
